name: DailyIQ
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "9L6N2ZF26B"
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES

targets:
  DailyIQ:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Sources/Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Sources/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.DailyIQ
        PRODUCT_NAME: DailyIQAI
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Sources/App/DailyIQ.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    dependencies:
      - package: SnapKit
      - package: SQLite.swift

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit
    from: "5.6.0"
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.14.1"
